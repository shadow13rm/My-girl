<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Queen ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:Arial, sans-serif;
    color:white;
}

/* الصفحة الأولى */

#page1{
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.heart-btn{
    font-size:70px;
    color:#ffb6c1;
    cursor:pointer;
    border:none;
    background:none;
    transition:.3s;
}

.heart-btn:hover{
    transform:scale(1.15);
}

.label{
    margin-top:10px;
    text-align:left;
    color:white;
}

.line{
    width:250px;
    height:3px;
    background:white;
    margin-top:8px;
}

/* الصفحة الثانية */

#page2{
    position:absolute;
    width:100%;
    height:100vh;
    display:none;
}

.dot{
    position:absolute;
    width:16px;
    height:16px;
    border-radius:50%;
    background:pink;
    left:50%;
    top:-30px;
    transform:translateX(-50%);
}

.ground{
    position:absolute;
    width:400px;
    height:3px;
    background:white;
    left:50%;
    bottom:180px;
    transform:translateX(-50%);
}

.trunk{
    position:absolute;
    width:22px;
    height:0;
    background:#ffc0cb;
    left:50%;
    bottom:180px;
    transform:translateX(-50%);
}

.tree{
    position:absolute;
    left:50%;
    bottom:380px;
    transform:translateX(-50%);
    width:320px;
    height:260px;
}

.heart{
    position:absolute;
    opacity:0;
    font-size:22px;
    animation:showHeart .5s forwards;
}

@keyframes showHeart{
    to{
        opacity:1;
    }
}

.message{
    position:absolute;
    left:120px;
    top:180px;
    width:340px;
    font-size:28px;
    line-height:1.6;
    white-space:pre-line;
}

.cursor{
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}
</style>
</head>

<body>

<div id="page1">

    <button class="heart-btn" onclick="startAnimation()">
        ❤️
    </button>

    <div class="label">
        Click Me :)<br>
        Birthday Queen !
    </div>

    <div class="line"></div>

</div>

<div id="page2">

    <div class="dot" id="dot"></div>

    <div class="ground"></div>

    <div class="trunk" id="trunk"></div>

    <div class="tree" id="tree"></div>

    <div class="message" id="message"></div>

</div>

<script>

function startAnimation(){

    document.getElementById("page1").style.display="none";
    document.getElementById("page2").style.display="block";

    const dot=document.getElementById("dot");

    dot.animate([
        {top:"-30px"},
        {top:"calc(100vh - 190px)"}
    ],{
        duration:1500,
        fill:"forwards"
    });

    setTimeout(growTree,1500);
}

function growTree(){

    const trunk=document.getElementById("trunk");

    trunk.animate([
        {height:"0px"},
        {height:"220px"}
    ],{
        duration:1500,
        fill:"forwards"
    });

    setTimeout(createHeartTree,1500);
}

function createHeartTree(){

    const tree=document.getElementById("tree");

    for(let i=0;i<180;i++){

        const h=document.createElement("div");

        h.className="heart";

        h.innerHTML="❤️";

        const angle=Math.random()*Math.PI*2;
        const radius=Math.random()*120;

        const x=Math.cos(angle)*radius+140;
        const y=Math.sin(angle)*radius+110;

        h.style.left=x+"px";
        h.style.top=y+"px";

        h.style.animationDelay=(i*0.03)+"s";

        tree.appendChild(h);
    }

    setTimeout(typeMessage,2500);
}

function typeMessage(){

    const text=
`Hey you 💕
Happy Birthday 🎈
May God bless you 🍀
And give u many happiness 💞
Just saying... you're pretty awesome ❤️
Sending good vibes and maybe a wink 😉`;

    let i=0;

    const box=document.getElementById("message");

    function typing(){

        if(i<text.length){

            box.innerHTML=text.substring(0,i+1)+"<span class='cursor'>|</span>";

            i++;

            setTimeout(typing,55);
        }
        else{
            box.innerHTML=text;
        }
    }

    typing();
}

</script>

</body>
</html>
