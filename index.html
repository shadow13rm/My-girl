<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Queen ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* ----- الصفحة الأولى ----- */
        #page1 {
            position: absolute;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: black;
            z-index: 99999; 
        }

        .click-area {
            cursor: pointer;
            position: relative;
            z-index: 100000;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .big-heart {
            font-size: 65px;
            color: #ffb6c1;
            animation: pulse 1.5s infinite;
            display: inline-block;
        }

        @keyframes pulse {
            50% { transform: scale(1.1); }
        }

        .text-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .click-text {
            font-size: 16px;
            color: #ccc;
            line-height: 1.4;
        }

        .click-line {
            width: 200px;
            height: 2px;
            background: #ccc;
            margin-top: 5px;
        }

        /* ----- الصفحة الثانية ----- */
        #page2 {
            display: none;
            position: absolute;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: 1;
        }

        .message {
            position: absolute;
            left: 8%;
            top: 25%;
            width: 45%;
            font-size: 20px;
            line-height: 1.8;
            white-space: pre-line;
            text-align: left;
            z-index: 10;
            font-family: monospace;
        }

        .cursor {
            animation: blink .8s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .seed {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #ff7da7;
            border-radius: 50%;
            left: 80%; 
            top: -20px;
        }

        .ground {
            position: absolute;
            bottom: 120px;
            left: 0;
            width: 100%;
            height: 3px;
            background: white;
        }

        .treeCanvas {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            from { opacity: .1; }
            to { opacity: 0.8; }
        }

        /* ----- تعديلات الموبايل (Responsive Design) ----- */
        @media (max-width: 768px) {
            .message {
                left: 5%;
                top: 8%; /* رفع النص للأعلى */
                width: 90%; /* إعطاء النص مساحة عرض أكبر */
                font-size: 16px; /* تصغير الخط قليلاً ليناسب الشاشة */
                line-height: 1.6;
            }
            .seed {
                left: 50%; /* وضع البذرة والشجرة في المنتصف */
                margin-left: -6px;
            }
        }
    </style>
</head>
<body>

    <div id="page1">
        <div class="click-area" onclick="startAnimation()">
            <div class="big-heart">♥</div>
            <div class="text-group">
                <div class="click-text">
                    Click Me :)<br>
                    Birthday Queen !
                </div>
                <div class="click-line"></div>
            </div>
        </div>
    </div>

    <div id="page2">
        <div id="message" class="message"></div>
        <div class="seed" id="seed"></div>
        <div class="ground"></div>
        <canvas id="treeCanvas" class="treeCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("treeCanvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        createStars();

        function createStars() {
            for(let i = 0; i < 150; i++) {
                const star = document.createElement("div");
                star.className = "star";
                const size = Math.random() * 2 + 1;
                star.style.width = size + "px";
                star.style.height = size + "px";
                star.style.left = Math.random() * window.innerWidth + "px";
                star.style.top = Math.random() * window.innerHeight + "px";
                star.style.animationDuration = (1.5 + Math.random() * 3) + "s";
                document.body.appendChild(star);
            }
        }

        function startAnimation() {
            document.getElementById("page1").style.display = "none";
            document.getElementById("page2").style.display = "block";
            
            const seed = document.getElementById("seed");
            const groundY = window.innerHeight - 120;
            
            // قراءة موقع البذرة تلقائياً عشان يطابق التلفون (بالنص) واللابتوب (ع اليمين)
            const seedRect = seed.getBoundingClientRect();
            const seedX = seedRect.left + (seedRect.width / 2);
            
            seed.animate(
                [
                    { top: "-20px" },
                    { top: (groundY - 6) + "px" }
                ],
                {
                    duration: 1200,
                    fill: "forwards",
                    easing: "ease-in"
                }
            );
            
            setTimeout(() => {
                seed.style.display = "none";
                drawTree(seedX, groundY);
            }, 1200);
        }

        function branch(x, y, len, angle, width, generation) {
            if (generation > 11) {
                drawHeartLeaves(x, y);
                return;
            }
            
            ctx.beginPath();
            ctx.strokeStyle = generation < 3 ? "#ffaec9" : "#ff7da7";
            ctx.lineWidth = width;
            ctx.lineCap = "round";
            ctx.moveTo(x, y);
            
            const x2 = x + Math.cos(angle) * len;
            const y2 = y + Math.sin(angle) * len;
            
            ctx.lineTo(x2, y2);
            ctx.stroke();
            
            let angleOffset1 = 0.35;
            let angleOffset2 = 0.35;
            
            if (generation >= 2 && generation <= 5) {
                angleOffset1 = 0.55; 
                angleOffset2 = 0.55;
            }

            setTimeout(() => {
                branch(x2, y2, len * 0.82, angle - angleOffset1, width * 0.72, generation + 1);
                branch(x2, y2, len * 0.82, angle + angleOffset2, width * 0.72, generation + 1);
            }, 90);
        }

        function drawHeartLeaves(x, y) {
            const colors = ["#ff1493", "#ff69b4", "#ffa500", "#fffa65", "#ff66b2", "#ffb6c1"];
            
            for (let i = 0; i < 4; i++) {
                ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                ctx.font = (12 + Math.random() * 16) + "px Arial";
                ctx.fillText(
                    "♥", 
                    x + (Math.random() * 36 - 18), 
                    y + (Math.random() * 36 - 18)
                );
            }
        }

        function drawTree(startX, startY) {
            // تحديد حجم الشجرة بناءً على عرض الشاشة
            const isMobile = window.innerWidth < 768;
            const trunkLen = isMobile ? 80 : 120; // 80 للموبايل، 120 للابتوب
            const trunkWidth = isMobile ? 15 : 22; // 15 للموبايل، 22 للابتوب

            branch(startX, startY, trunkLen, -Math.PI / 2, trunkWidth, 1);
            
            setTimeout(() => {
                typeMessage();
            }, 3000);
        }

        function typeMessage() {
            const text = `Hey you 💕\nHappy Birthday 🎈\nMay God bless you 🍀\nAnd give u many happiness 💞\nJust saying... you're pretty\nawesome 💖\nSending good vibes and maybe a\nwink 😉`;
            
            let i = 0;
            const box = document.getElementById("message");
            
            function write() {
                if (i < text.length) {
                    box.innerHTML = text.substring(0, i + 1) + "<span class='cursor'>|</span>";
                    i++;
                    setTimeout(write, 50); 
                } else {
                    box.innerHTML = text;
                }
            }
            
            write();
        }
    </script>
</body>
</html>
