<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Girl - 3D Gift</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #e94f9e;
            --shadow: rgba(0, 0, 0, 0.2);
        }

        *{ margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle, #fff5f9 0%, #f9f3f9 100%);
            text-align: center;
            overflow-x: hidden;
            perspective: 1000px; /* لعمل تأثير الـ 3D في الصفحة */
        }

        .page {
            display: none;
            padding: 40px 20px;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .page.active { display: flex; animation: fadeIn 0.5s ease; }

        .title, .subtitle {
            font-family: 'Dancing Script', cursive;
            font-size: 42px;
            color: var(--primary);
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* تأثير الهدية 3D تهز يمين وشمال */
        .gift {
            font-size: 100px;
            cursor: pointer;
            position: relative;
            display: inline-block;
            transition: transform 0.3s;
            animation: shake3D 2s infinite ease-in-out;
            transform-style: preserve-3d;
        }

        @keyframes shake3D {
            0% { transform: rotateY(0deg) rotateX(0deg); }
            25% { transform: rotateY(20deg) rotateX(10deg); }
            50% { transform: rotateY(-20deg) rotateX(-10deg); }
            75% { transform: rotateY(15deg) rotateX(5deg); }
            100% { transform: rotateY(0deg) rotateX(0deg); }
        }

        /* كبسات 3D بارزة */
        .btn {
            background: #ff77c5;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px #d14d8b, 0 10px 15px var(--shadow);
            transition: all 0.2s ease;
            transform: translateZ(20px);
        }

        .btn:active {
            box-shadow: 0 2px #d14d8b, 0 5px 10px var(--shadow);
            transform: translateY(4px);
        }

        /* البطاقات 3D */
        .cards {
            display: flex;
            gap: 20px;
            margin: 40px 0;
            perspective: 1000px;
        }

        .card-container {
            width: 80px;
            height: 120px;
            cursor: pointer;
            perspective: 1000px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px var(--shadow);
            border-radius: 12px;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            font-size: 30px;
        }

        .card-front {
            background: #ffd6ea;
            color: #e94f9e;
        }

        .card-back {
            background: #ffe3f3;
            color: var(--primary);
            transform: rotateY(180deg);
        }

        .final-message {
            opacity: 0;
            transform: translateZ(-100px);
            transition: all 1s ease;
            font-size: 24px;
            margin-top: 30px;
            color: var(--primary);
            font-weight: bold;
        }
        .final-message.show {
            opacity: 1;
            transform: translateZ(0);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="page1" class="page active">
        <h1 class="title">I have a gift for you...</h1>
        <div class="gift" id="gift">🎁</div>
        <p style="margin-top:20px; color:#e94f9e">Tap the gift!</p>
    </div>

    <div id="page2" class="page">
        <div class="heart" style="font-size: 100px; animation: pulse 1.5s infinite;">❤️</div>
        <h2 class="subtitle">You are special!</h2>
        <button class="btn" id="open2">Open Next Step</button>
    </div>

    <div id="page3" class="page">
        <h2 class="subtitle">Pick your cards</h2>
        <div class="cards">
            <div class="card-container">
                <div class="card" onclick="flipCard(this)" data-emoji="🌸">
                    <div class="card-front">?</div>
                    <div class="card-back">🌸</div>
                </div>
            </div>
            <div class="card-container">
                <div class="card" onclick="flipCard(this)" data-emoji="✨">
                    <div class="card-front">?</div>
                    <div class="card-back">✨</div>
                </div>
            </div>
            <div class="card-container">
                <div class="card" onclick="flipCard(this)" data-emoji="💖">
                    <div class="card-front">?</div>
                    <div class="card-back">💖</div>
                </div>
            </div>
        </div>
        <div id="finalMessage" class="final-message">
            كل عام وأنتِ بخير يا أجمل ما في الكون! 🌸
        </div>
    </div>

    <script>
        // التنقل بين الصفحات
        document.getElementById("gift").onclick = () => showPage("page2");
        document.getElementById("open2").onclick = () => showPage("page3");

        function showPage(id) {
            document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
            document.getElementById(id).classList.add("active");
        }

        // منطق البطاقات
        let openedCards = 0;
        function flipCard(cardElement) {
            if (!cardElement.classList.contains("flipped")) {
                cardElement.classList.add("flipped");
                openedCards++;
                
                if (openedCards === 3) {
                    setTimeout(() => {
                        document.getElementById("finalMessage").classList.add("show");
                    }, 800);
                }
            }
        }
    </script>
</body>
</html>
