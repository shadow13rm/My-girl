<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#090012;
    overflow:hidden;
    font-family:Arial, sans-serif;
    color:white;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

.message{
    position:absolute;
    left:60px;
    top:35%;
    width:320px;
    font-size:24px;
    line-height:1.8;
    white-space:pre-line;
}

.cursor{
    animation:blink 0.8s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="message">
    <span id="typing"></span><span class="cursor">|</span>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const hearts = [];

function createHeartTree(){

    const centerX = canvas.width * 0.72;
    const centerY = canvas.height * 0.42;

    for(let i=0;i<900;i++){

        const t = Math.random() * Math.PI * 2;

        const x = 16 * Math.pow(Math.sin(t),3);
        const y =
            13 * Math.cos(t)
            - 5 * Math.cos(2*t)
            - 2 * Math.cos(3*t)
            - Math.cos(4*t);

        hearts.push({
            x:centerX + x * 18 + (Math.random()-0.5)*25,
            y:centerY - y * 18 + (Math.random()-0.5)*25,
            size:6 + Math.random()*10,
            color:[
                "#ff4d6d",
                "#ff85a1",
                "#ff006e",
                "#ffc2d1",
                "#ffbe0b"
            ][Math.floor(Math.random()*5)]
        });
    }
}

function drawHeart(x,y,size,color){
    ctx.save();
    ctx.translate(x,y);
    ctx.fillStyle=color;

    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(
        -size,-size,
        -size*2,size/2,
        0,size*2
    );
    ctx.bezierCurveTo(
        size*2,size/2,
        size,-size,
        0,0
    );
    ctx.fill();

    ctx.restore();
}

createHeartTree();

let progress = 0;

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // trunk
    ctx.fillStyle="#f8b4c8";
    ctx.fillRect(
        canvas.width*0.7,
        canvas.height*0.52,
        30,
        200
    );

    progress += 4;

    for(let i=0;i<Math.min(progress, hearts.length);i++){
        const h = hearts[i];
        drawHeart(h.x,h.y,h.size,h.color);
    }

    requestAnimationFrame(animate);
}

animate();

const text =
`Hey you 💕
Happy Birthday 🎈

May God bless you 🙏

And give u many happiness 💞

Just saying...
you're pretty awesome ❤️`;

let i = 0;

function typeWriter(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 55);
    }
}

setTimeout(typeWriter, 3500);
</script>

</body>
</html>
