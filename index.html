<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Queen ❤️</title>

<style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow:hidden;
font-family:Arial,sans-serif;
color:white;
}

/* الصفحة الأولى */

#page1{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.click-area{
cursor:pointer;
text-align:center;
}

.big-heart{
font-size:90px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.1);
}
}

.click-text{
margin-top:10px;
font-size:18px;
}

.click-line{
width:260px;
height:2px;
background:white;
margin-top:10px;
}

/* الصفحة الثانية */

#page2{
display:none;
position:absolute;
width:100%;
height:100vh;
overflow:hidden;
}

.seed{
position:absolute;
width:14px;
height:14px;
background:#ff69b4;
border-radius:50%;
left:50%;
top:-20px;
transform:translateX(-50%);
}

.ground{
position:absolute;
bottom:170px;
left:50%;
transform:translateX(-50%);
width:400px;
height:2px;
background:white;
}

.treeCanvas{
position:absolute;
right:50px;
bottom:120px;
}

.message{
position:absolute;
left:70px;
top:180px;
width:500px;
font-size:32px;
line-height:1.5;
white-space:pre-line;
}

.cursor{
animation:blink .8s infinite;
}

@keyframes blink{
50%{
opacity:0;
}
}
    </style>
</head>

<body>

<div id="page1">

<div class="click-area" onclick="startAnimation()">

<div class="big-heart">💗</div>

<div class="click-text">
Click Me :)<br>
Birthday Queen !
</div>

<div class="click-line"></div>

</div>

</div>

<div id="page2">

<div class="seed" id="seed"></div>

<div class="ground"></div>

<canvas
id="treeCanvas"
class="treeCanvas"
width="600"
height="600">
</canvas>

<div id="message" class="message"></div>

</div>

<script>
    const canvas =
document.getElementById("treeCanvas");

const ctx =
canvas.getContext("2d");

function startAnimation(){

document.getElementById("page1")
.style.display="none";

document.getElementById("page2")
.style.display="block";

const seed =
document.getElementById("seed");

seed.animate(
[
{top:"-20px"},
{top:"calc(100vh - 177px)"}
],
{
duration:1500,
fill:"forwards"
}
);

setTimeout(drawTree,1600);

}
    function branch(x,y,len,angle,width){

if(width<2){
drawHeart(x,y);
return;
}

ctx.beginPath();

ctx.strokeStyle="#ff9fcf";

ctx.lineWidth=width;

ctx.moveTo(x,y);

const x2=
x+Math.cos(angle)*len;

const y2=
y+Math.sin(angle)*len;

ctx.lineTo(x2,y2);

ctx.stroke();

setTimeout(()=>{

branch(
x2,
y2,
len*0.75,
angle-0.4,
width*0.7
);

branch(
x2,
y2,
len*0.75,
angle+0.4,
width*0.7
);

},100);

}

function drawTree(){

branch(
300,
550,
100,
-Math.PI/2,
12
);

setTimeout(()=>{
typeMessage();
},5000);

}
    function drawHeart(x,y){

ctx.fillStyle="#ff69b4";

ctx.font=
(12+Math.random()*14)+"px Arial";

ctx.fillText("❤",x,y);

}
    function typeMessage(){

const text=
`To My Birthday Queen 💗

Happy Birthday ✨

I hope your day is filled
with happiness, love,
and beautiful moments.

Thank you for being
part of my life ❤️`;

let i=0;

const box=
document.getElementById("message");

function write(){

if(i<text.length){

box.innerHTML=
text.substring(0,i+1)+
"<span class='cursor'>|</span>";

i++;

setTimeout(write,45);

}else{

box.innerHTML=text;

}

}

write();

}
    </script>

</body>
</html>
