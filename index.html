<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Queen ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* ----- النجوم في الخلفية ----- */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
            z-index: 0;
        }

        @keyframes twinkle {
            from { opacity: .1; }
            to { opacity: 0.8; }
        }

        /* ----- الصفحة الأولى ----- */
        #page1 {
            position: absolute;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: black;
            z-index: 99999; 
        }

        .click-area {
            cursor: pointer;
            position: relative;
            z-index: 100000;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .big-heart {
            font-size: 55px;
            color: #ffb6c1;
            animation: pulse 1.5s infinite;
            display: inline-block;
        }

        @keyframes pulse {
            50% { transform: scale(1.1); }
        }

        .text-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .click-text {
            font-size: 15px;
            color: #ccc;
            line-height: 1.4;
        }

        .click-line {
            width: 160px;
            height: 2px;
            background: #ccc;
            margin-top: 5px;
        }

        /* ----- الصفحة الثانية (الشجرة) ----- */
        #page2 {
            display: none;
            position: absolute;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: 10;
        }

        .seed {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ff7da7;
            border-radius: 50%;
            left: 50%;
            transform: translateX(-50%);
            top: -20px;
        }

        .ground {
            position: absolute;
            bottom: 15%;
            left: 0;
            width: 100%;
            height: 2px;
            background: white;
        }

        .treeCanvas {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 20;
        }

        #tapHint {
            position: absolute;
            top: 8%;
            width: 100%;
            text-align: center;
            color: #ffb6c1;
            font-size: 18px;
            font-family: Arial, sans-serif;
            animation: pulse 1.5s infinite;
            display: none;
            z-index: 30;
            pointer-events: none;
            text-shadow: 0 0 10px #ff69b4;
        }

        /* ----- الصفحة الثالثة (الرسالة) ----- */
        #page3 {
            display: none;
            position: absolute;
            width: 100%;
            height: 100vh;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }

        .message {
            font-size: 15px;
            line-height: 1.7;
            white-space: pre-line;
            text-align: center;
            font-family: monospace;
            padding: 20px;
            background: rgba(20, 20, 20, 0.85);
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(255, 105, 180, 0.4);
            border: 1px solid rgba(255, 105, 180, 0.4);
            backdrop-filter: blur(5px);
            width: 85%;
            max-width: 340px;
        }

        .cursor {
            animation: blink .8s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="page1">
        <div class="click-area" onclick="startAnimation()">
            <div class="big-heart">♥</div>
            <div class="text-group">
                <div class="click-text">
                    Click Me :)<br>
                    Birthday Queen !
                </div>
                <div class="click-line"></div>
            </div>
        </div>
    </div>

    <div id="page2">
        <div id="tapHint">✨ Tap the Tree ✨</div>
        <div class="seed" id="seed"></div>
        <div class="ground" id="ground"></div>
        <canvas id="treeCanvas" class="treeCanvas"></canvas>
    </div>

    <div id="page3">
        <div id="message" class="message"></div>
    </div>

    <script>
        const canvas = document.getElementById("treeCanvas");
        const ctx = canvas.getContext("2d");
        
        let leavesPos = []; 
        let isTreeReady = false; 

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        createStars();

        function createStars() {
            const starCount = window.innerWidth < 768 ? 80 : 150;
            for(let i = 0; i < starCount; i++) {
                const star = document.createElement("div");
                star.className = "star";
                const size = Math.random() * 2 + 1;
                star.style.width = size + "px";
                star.style.height = size + "px";
                star.style.left = Math.random() * window.innerWidth + "px";
                star.style.top = Math.random() * window.innerHeight + "px";
                star.style.animationDuration = (1.5 + Math.random() * 3) + "s";
                document.body.appendChild(star);
            }
        }

        function startAnimation() {
            document.getElementById("page1").style.display = "none";
            document.getElementById("page2").style.display = "block";
            
            const seed = document.getElementById("seed");
            const groundY = window.innerHeight * 0.85; 
            const seedX = window.innerWidth / 2;
            
            seed.animate(
                [
                    { top: "-20px" },
                    { top: (groundY - 5) + "px" }
                ],
                {
                    duration: 1200,
                    fill: "forwards",
                    easing: "ease-in"
                }
            );
            
            setTimeout(() => {
                seed.style.display = "none";
                drawTree(seedX, groundY);
            }, 1200);
        }

        function branch(x, y, len, angle, width, generation) {
            if (generation > 11) {
                drawHeartLeaves(x, y);
                return;
            }
            
            ctx.beginPath();
            ctx.strokeStyle = generation < 3 ? "#ffaec9" : "#ff7da7";
            ctx.lineWidth = width;
            ctx.lineCap = "round";
            ctx.moveTo(x, y);
            
            const x2 = x + Math.cos(angle) * len;
            const y2 = y + Math.sin(angle) * len;
            
            ctx.lineTo(x2, y2);
            ctx.stroke();
            
            let angleOffset1 = 0.35;
            let angleOffset2 = 0.35;
            
            if (generation >= 2 && generation <= 5) {
                angleOffset1 = 0.55; 
                angleOffset2 = 0.55;
            }

            setTimeout(() => {
                // تم تعديل التمدد إلى 0.50 حسب طلبك
                branch(x2, y2, len * 0.50, angle - angleOffset1, width * 0.72, generation + 1);
                branch(x2, y2, len * 0.50, angle + angleOffset2, width * 0.72, generation + 1);
            }, 70); 
        }

        function drawHeartLeaves(x, y) {
            const colors = ["#ff1493", "#ff69b4", "#ffa500", "#fffa65", "#ff66b2", "#ffb6c1"];
            
            for (let i = 0; i < 4; i++) {
                let color = colors[Math.floor(Math.random() * colors.length)];
                let size = 12 + Math.random() * 16; 
                let lx = x + (Math.random() * 26 - 13);
                let ly = y + (Math.random() * 26 - 13);

                ctx.fillStyle = color;
                ctx.font = size + "px Arial";
                ctx.fillText("♥", lx, ly);

                if (Math.random() < 0.185) { 
                    leavesPos.push({
                        x: lx,
                        y: ly,
                        color: color,
                        size: size,
                        vx: (Math.random() - 0.5) * 12,  
                        vy: (Math.random() - 0.5) * 12 - 4, 
                        alpha: 1
                    });
                }
            }
        }

        function drawTree(startX, startY) {
            leavesPos = []; 
            const isMobile = window.innerWidth < 768;
            const trunkLen = isMobile ? 85 : 140; 
            const trunkWidth = isMobile ? 18 : 24; 

            branch(startX, startY, trunkLen, -Math.PI / 2, trunkWidth, 1);
            
            setTimeout(() => {
                isTreeReady = true;
                document.getElementById("tapHint").style.display = "block";
            }, 2000);
        }

        canvas.addEventListener('click', () => {
            if (!isTreeReady) return;
            isTreeReady = false; 
            document.getElementById("tapHint").style.display = "none";
            document.getElementById("ground").style.display = "none"; 
            
            explodeTree();
        });

        function explodeTree() {
            function animateBurst() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let active = false;

                for (let i = 0; i < leavesPos.length; i++) {
                    let p = leavesPos[i];
                    if (p.alpha <= 0) continue;
                    active = true;

                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.6; 
                    p.alpha -= 0.03; 

                    ctx.globalAlpha = Math.max(0, p.alpha);
                    ctx.fillStyle = p.color;
                    ctx.font = p.size + "px Arial";
                    ctx.fillText("♥", p.x, p.y);
                }
                
                ctx.globalAlpha = 1; 

                if (active) {
                    requestAnimationFrame(animateBurst);
                } else {
                    document.getElementById("page2").style.display = "none";
                    document.getElementById("page3").style.display = "flex";
                    typeMessage();
                }
            }
            animateBurst(); 
        }

        function typeMessage() {
            const text = `Hey you 💕\nHappy Birthday 🎈\nMay God bless you 🍀\nAnd give u many happiness 💞\nJust saying... you're pretty\nawesome 💖\nSending good vibes and maybe a\nwink 😉`;
            
            let i = 0;
            const box = document.getElementById("message");
            
            function write() {
                if (i < text.length) {
                    box.innerHTML = text.substring(0, i + 1) + "<span class='cursor'>|</span>";
                    i++;
                    setTimeout(write, 50); 
                } else {
                    box.innerHTML = text; 
                }
            }
            
            write();
        }
    </script>
</body>
</html>
