<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Queen ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* ----- الصفحة الأولى ----- */
        #page1 {
            position: absolute;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: black;
            z-index: 99999; 
        }

        .click-area {
            cursor: pointer;
            text-align: center;
            position: relative;
            z-index: 100000;
        }

        .big-heart {
            font-size: 95px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            50% {
                transform: scale(1.12);
            }
        }

        .click-text {
            margin-top: 10px;
            font-size: 18px;
        }

        .click-line {
            width: 260px;
            height: 2px;
            background: white;
            margin-top: 10px;
        }

        /* ----- الصفحة الثانية ----- */
        #page2 {
            display: none;
            position: absolute;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: 1;
        }

        /* محاذاة النص إلى اليمين وترتيب موقعه يسار الشاشة */
        .message {
            position: absolute;
            right: auto;
            left: 5%;
            top: 8%;
            width: 45%;
            font-size: 24px;
            line-height: 1.8;
            white-space: pre-line;
            text-align: right;
            direction: rtl; /* لدعم الكتابة العربية بشكل صحيح */
            z-index: 10;
        }

        .cursor {
            animation: blink .8s infinite;
            display: inline-block;
            margin-right: 2px;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .seed {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #ff69b4;
            border-radius: 50%;
            left: 70%; /* محاذاة البذرة مع جذع الشجرة الجديد */
            top: -20px;
        }

        /* الخط الأرضي الأبيض الممتد بالأسفل */
        .ground {
            position: absolute;
            bottom: 120px;
            left: 5%;
            width: 90%;
            height: 2px;
            background: white;
        }

        /* النص الموجود أسفل الخط تماماً */
        .footer-text {
            position: absolute;
            bottom: 85px;
            left: 5%;
            font-size: 16px;
            font-family: Arial, sans-serif;
            color: white;
            z-index: 10;
        }

        /* وضع الكانفاس في جهة اليمين ليطابق التصميم */
        .treeCanvas {
            position: absolute;
            right: 5%;
            bottom: 120px;
            pointer-events: none; 
        }

        .glow {
            position: absolute;
            width: 650px;
            height: 650px;
            right: 5%;
            bottom: 60px;
            border-radius: 50%;
            background: radial-gradient(
                circle,
                rgba(255, 105, 180, .15),
                transparent 70%
            );
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            from { opacity: .2; }
            to { opacity: 1; }
        }

        .petal {
            position: absolute;
            font-size: 14px;
            pointer-events: none;
            opacity: .8;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="page1">
        <div class="click-area" onclick="startAnimation()">
            <div class="big-heart">💖</div>
            <div class="click-text">
                Click Me :)<br>
                Birthday Queen !
            </div>
            <div class="click-line"></div>
        </div>
    </div>

    <div id="page2">
        <div id="message" class="message"></div>
        <div class="seed" id="seed"></div>
        <div class="ground"></div>
        <div class="footer-text">click me :) to flower the happy birthday</div>
        <div class="glow"></div>
        <canvas id="treeCanvas" class="treeCanvas" width="600" height="550"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("treeCanvas");
        const ctx = canvas.getContext("2d");

        createStars();

        function createStars() {
            for(let i = 0; i < 250; i++) {
                const star = document.createElement("div");
                star.className = "star";
                
                const size = Math.random() * 3 + 1;
                star.style.width = size + "px";
                star.style.height = size + "px";
                
                star.style.left = Math.random() * window.innerWidth + "px";
                star.style.top = Math.random() * window.innerHeight + "px";
                
                star.style.animationDuration = (1 + Math.random() * 3) + "s";
                
                document.body.appendChild(star);
            }
        }

        function startAnimation() {
            document.getElementById("page1").style.display = "none";
            document.getElementById("page2").style.display = "block";
            
            createPetals();
            
            const seed = document.getElementById("seed");
            // تحريك البذرة لتسقط على قاعدة الشجرة الجديدة تماماً
            seed.animate(
                [
                    { top: "-20px" },
                    { top: "calc(100vh - 127px)" }
                ],
                {
                    duration: 1500,
                    fill: "forwards"
                }
            );
            
            setTimeout(() => {
                drawTree();
            }, 1600);
        }

        function createPetals() {
            setInterval(() => {
                const petal = document.createElement("div");
                petal.className = "petal";
                petal.innerHTML = "🌸";
                
                petal.style.left = Math.random() * window.innerWidth + "px";
                petal.style.animationDuration = (6 + Math.random() * 5) + "s";
                
                document.body.appendChild(petal);
                
                setTimeout(() => {
                    petal.remove();
                }, 12000);
            }, 250);
        }

        function branch(x, y, len, angle, width) {
            if (width < 0.5) {
                drawHeart(x, y);
                return;
            }
            
            ctx.beginPath();
            ctx.strokeStyle = "#ff9fcf";
            ctx.lineWidth = width;
            ctx.moveTo(x, y);
            
            const x2 = x + Math.cos(angle) * len;
            const y2 = y + Math.sin(angle) * len;
            
            ctx.lineTo(x2, y2);
            ctx.stroke();
            
            setTimeout(() => {
                branch(x2, y2, len * 0.8, angle - 0.38, width * 0.7);
                branch(x2, y2, len * 0.8, angle + 0.38, width * 0.7);
            }, 100);
        }

        function drawHeart(x, y) {
            const colors = ["#ff69b4", "#ff1493", "#ff85c1", "#ffc0cb", "#ffd1dc"];
            
            for (let i = 0; i < 3; i++) {
                ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                ctx.font = (10 + Math.random() * 14) + "px Arial";
                // رسم القلوب الشجرية الوردية الصغيرة المماثلة لطلبك
                ctx.fillText(
                    "🌸", 
                    x + (Math.random() * 16 - 8), 
                    y + (Math.random() * 16 - 8)
                );
            }
        }

        function drawTree() {
            // رسم الجذع في منتصف مساحة الكانفاس المخصصة له (العرض 600، الارتفاع 550)
            branch(300, 550, 105, -Math.PI / 2, 11);
            
            setTimeout(() => {
                typeMessage();
            }, 8500);
        }

        function typeMessage() {
            // النص باللغة العربية مطابق تماماً لطلبك في التصميم
            const text = `إلى ملكة عيد ميلادي 💖\n\nعيد ميلاد سعيد ✨\n\nاليوم كله لكِ.\n\nأتمنى أن يمتلئ قلبكِ\nبالسعـادة،\nوأيامكِ بالضحكِ،\nومستقبلكِ بالنـجاح.\n\nشكراً لكل ابتسامة،\nولكل ذكرى،\nولكل لحظة جميلة.\n\nتستحقين حباً لا ينتهي،\nوفرحة لا تنتهي،\nوسعادة لا تنتهي.\n\nأتمنى لكِ أجمل\nعيد ميلاد على الإطلاق ❤️`;
            
            let i = 0;
            const box = document.getElementById("message");
            
            function write() {
                if (i < text.length) {
                    box.innerHTML = text.substring(0, i + 1) + "<span class='cursor'>|</span>";
                    i++;
                    setTimeout(write, 55); // سرعة متناسقة ومناسبة للقراءة العربية
                } else {
                    box.innerHTML = text;
                }
            }
            
            write();
        }
    </script>
</body>
</html>
